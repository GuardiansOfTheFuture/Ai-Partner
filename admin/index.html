<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 女友 · 管理后台</title>
<style>
  :root { --bg:#F8FAFC; --card:#FFF; --border:#E2E8F0; --text:#1E293B; --muted:#64748B; --pink:#FF6B6B; --cta:#2563EB; --cta-h:#1D4ED8; --success:#22C55E; --radius:8px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font:14px/1.6 -apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
  nav { width:220px; background:var(--card); border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
  nav .logo { font-size:18px; font-weight:700; color:var(--pink); margin-bottom:20px; }
  nav a { display:block; padding:8px 12px; border-radius:6px; color:var(--muted); font-size:13px; cursor:pointer; }
  nav a:hover,nav a.active { background:#FFF0F5; color:var(--pink); }
  main { flex:1; padding:24px; overflow-y:auto; }
  main h1 { font-size:22px; margin-bottom:20px; }
  .card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
  .stat { background:var(--card); border-radius:var(--radius); padding:16px 20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .stat .v { font-size:28px; font-weight:700; color:var(--pink); }
  .stat .l { font-size:12px; color:var(--muted); margin-top:2px; }
  input,textarea,button,select { font:inherit; }
  input,textarea { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; margin-bottom:10px; }
  textarea { resize:vertical; min-height:80px; }
  button { padding:8px 18px; border-radius:6px; border:none; cursor:pointer; font-weight:500; }
  .btn-p { background:var(--cta); color:#fff; } .btn-p:hover { background:var(--cta-h); }
  .btn-d { background:none; color:#EF4444; border:1px solid #FECACA; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; }
  .login-box { width:360px; margin:100px auto; background:var(--card); border-radius:12px; padding:32px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
  .login-box h1 { text-align:center; color:var(--pink); margin-bottom:24px; }
  .hidden { display:none !important; }
  .upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:24px; text-align:center; cursor:pointer; transition:.2s; }
  .upload-zone:hover { border-color:var(--cta); background:#F0F5FF; }
  .chunk-card { background:var(--bg); border-radius:6px; padding:12px; margin-bottom:8px; font-size:13px; }
  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; margin-right:4px; }
  .tag-p { background:#FFF0F5; color:var(--pink); }
  .tag-b { background:#F0F5FF; color:var(--cta); }
  .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal .box { background:#fff; border-radius:12px; padding:24px; width:700px; max-height:80vh; overflow-y:auto; }
  .close { float:right; border:none; background:none; font-size:20px; cursor:pointer; color:var(--muted); }
</style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <h1>AI 女友 · 管理后台</h1>
    <input id="login-user" placeholder="用户名" value="admin">
    <input id="login-pass" type="password" placeholder="密码" value="admin123">
    <button class="btn-p" onclick="login()" style="width:100%;">登录</button>
  </div>
</div>
<div id="admin-page" class="hidden" style="display:flex;width:100%;">
<nav>
  <div class="logo">AI 女友后台</div>
  <a class="active" data-page="dashboard" onclick="showPage('dashboard',this)">仪表盘</a>
  <a data-page="knowledge" onclick="showPage('knowledge',this)">知识库</a>
  <a data-page="conversations" onclick="showPage('conversations',this)">对话记录</a>
  <a data-page="users" onclick="showPage('users',this)">用户管理</a>
  <a data-page="config" onclick="showPage('config',this)">系统配置</a>
  <a onclick="logout()" style="color:#EF4444;margin-top:20px;">退出登录</a>
</nav>
<main id="main-content"></main>
</div>
<script>
let token = localStorage.getItem('admin_token');
const API = 'http://localhost:8000';
if (token) showAdmin();

async function login() {
  const r = await fetch(API+'/api/v1/admin/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('login-user').value,password:document.getElementById('login-pass').value})
  });
  if(!r.ok) return alert('账号或密码错误');
  token = (await r.json()).token;
  localStorage.setItem('admin_token',token);
  showAdmin();
}

function logout() { localStorage.removeItem('admin_token'); token=null; location.reload(); }
function showAdmin() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('admin-page').classList.remove('hidden');
  document.getElementById('admin-page').style.display='flex';
  showPage('dashboard',document.querySelector('nav a[data-page="dashboard"]'));
}

function showPage(page,el) {
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  if(page==='dashboard') loadDashboard();
  else if(page==='knowledge') loadKnowledge();
  else if(page==='users') loadUsers();
  else if(page==='conversations') loadConversations();
  else if(page==='config') loadConfig();
}

async function api(method,path,body) {
  const r = await fetch(API+path,{method,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:body?JSON.stringify(body):undefined});
  if(r.status===401){logout();throw new Error('Unauthorized');}
  return r.json();
}

// ── Dashboard ──
async function loadDashboard() {
  const d = await api('GET','/api/v1/admin/dashboard');
  document.getElementById('main-content').innerHTML=`
    <h1>仪表盘</h1>
    <div class="stats">
      <div class="stat"><div class="v">${d.document_count}</div><div class="l">知识库文档</div></div>
      <div class="stat"><div class="v">${d.chunk_count}</div><div class="l">文档块</div></div>
      <div class="stat"><div class="v">${d.user_count}</div><div class="l">用户数</div></div>
      <div class="stat"><div class="v">${d.conversation_count}</div><div class="l">对话数</div></div>
    </div>`;
}

// ── Knowledge ──
let kPage = 1;
async function loadKnowledge(pg) {
  if(pg) kPage = pg;
  const d = await api('GET',`/api/v1/admin/documents?page=${kPage}&page_size=10`);
  const rows = d.items.map(doc=>`
    <tr>
      <td>${doc.file_name}</td><td><span class="tag tag-p">${doc.file_type}</span></td>
      <td>${doc.chunk_count}块</td>
      <td><button class="btn-p" onclick="viewChunks('${doc.document_id}','${doc.file_name}')">查看块</button>
      <button class="btn-d" onclick="delDoc('${doc.document_id}')">删除</button></td>
    </tr>
  `).join('');
  document.getElementById('main-content').innerHTML=`
    <h1>知识库管理</h1>
    <div class="card">
      <h3 style="margin-bottom:12px;">上传文档</h3>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <p style="font-size:24px;margin-bottom:6px;">+</p>
        <p style="color:var(--muted);">点击选择 PDF / DOCX / TXT / MD (可多选)</p>
      </div>
      <input type="file" id="file-input" hidden accept=".pdf,.docx,.doc,.txt,.md,.markdown" multiple onchange="uploadDocs(this.files)">
      <div id="upload-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
    </div>
    <div class="card">
      <table><thead><tr><th>文件名</th><th>类型</th><th>块数</th><th>操作</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=4 style="color:var(--muted)">暂无文档</td></tr>'}</tbody></table>
      ${d.total>10?`<div style="margin-top:10px;text-align:center;">
        <button class="btn-p" onclick="loadKnowledge(${kPage-1})" ${kPage<=1?'disabled':''}>上一页</button>
        <span style="margin:0 12px;color:var(--muted);">${kPage}/${Math.ceil(d.total/10)}</span>
        <button class="btn-p" onclick="loadKnowledge(${kPage+1})" ${kPage>=Math.ceil(d.total/10)?'disabled':''}>下一页</button>
      </div>`:''}
    </div>
    <div id="chunk-viewer"></div>`;
}

async function uploadDocs(files) {
  if(!files.length) return;
  const s = document.getElementById('upload-status');
  let ok = 0;
  for(let i=0;i<files.length;i++){
    const fd = new FormData(); fd.append('file',files[i]);
    s.textContent = `处理: ${i+1}/${files.length} ${files[i].name}...`;
    const r = await fetch(API+'/api/v1/admin/documents/upload',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
    if(r.ok) ok++;
  }
  s.textContent = `完成: ${ok}/${files.length}`;
  setTimeout(()=>loadKnowledge(),500);
}

async function viewChunks(docId,docName) {
  const d = await api('GET','/api/v1/admin/documents/'+docId+'/chunks');
  const chunks = d.chunks.map(c=>`
    <div class="chunk-card">
      <div>${c.content.slice(0,300)}${c.content.length>300?'...':''}</div>
      <div style="margin-top:6px;">
        <span class="tag tag-p">id:${c.meta.chunk_id}</span>
        <span class="tag tag-b">#${c.meta.chunk_index}</span>
        <span style="font-size:11px;color:var(--muted)">${c.meta.file_name} · ${c.meta.file_type}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('chunk-viewer').innerHTML=`
    <div class="modal"><div class="box">
      <button class="close" onclick="document.getElementById('chunk-viewer').innerHTML=''">X</button>
      <h3>${docName} — ${d.total}块</h3>${chunks}
    </div></div>`;
}

async function delDoc(docId) { if(confirm('确认删除？')){ await api('DELETE','/api/v1/admin/documents/'+docId); loadKnowledge(); } }

// ── Users ──
async function loadUsers() {
  const d = await api('GET','/api/v1/admin/users');
  const rows = (d.items||[]).map(u=>`
    <tr>
      <td style="font-family:monospace;font-size:12px;">${u.id.slice(0,16)}</td>
      <td>${u.nickname}</td>
      <td style="font-size:11px;color:var(--muted);">${u.openid.slice(0,12)}...</td>
      <td><span style="color:${u.is_active?'var(--success)':'#EF4444'}">${u.is_active?'活跃':'禁用'}</span></td>
      <td>${u.created_at?.slice(0,10)||'-'}</td>
      <td><button class="${u.is_active?'btn-d':'btn-p'}" onclick="toggleUser('${u.id}',${!u.is_active})">${u.is_active?'禁用':'启用'}</button></td>
    </tr>
  `).join('');
  document.getElementById('main-content').innerHTML=`
    <h1>用户管理 (${d.total}人)</h1>
    <div class="card">
      <table><thead><tr><th>ID</th><th>昵称</th><th>OpenID</th><th>状态</th><th>注册</th><th>操作</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=6 style="color:var(--muted)">暂无用户</td></tr>'}</tbody></table>
    </div>`;
}
async function toggleUser(id,active) { await api('PUT','/api/v1/admin/users/'+id,{is_active:active}); loadUsers(); }

// ── Conversations ──
async function loadConversations() {
  const d = await api('GET','/api/v1/admin/conversations');
  const rows = (d.items||[]).map(c=>`
    <tr>
      <td>${c.character_name}</td><td>${c.title}</td><td>${c.message_count}条</td>
      <td style="font-size:11px;">${c.created_at?.slice(0,16)||'-'}</td>
      <td><button class="btn-p" onclick="viewConvMessages('${c.id}')">查看</button></td>
    </tr>
  `).join('');
  document.getElementById('main-content').innerHTML=`
    <h1>对话记录 (${d.total}个)</h1>
    <div class="card">
      <table><thead><tr><th>角色</th><th>标题</th><th>消息</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=5 style="color:var(--muted)">暂无对话</td></tr>'}</tbody></table>
    </div>
    <div id="msg-viewer"></div>`;
}
async function viewConvMessages(convId) {
  const d = await api('GET','/api/v1/admin/conversations/'+convId+'/messages');
  const msgs = d.messages.map(m=>`
    <div class="chunk-card">
      <span class="tag ${m.role==='user'?'tag-b':'tag-p'}">${m.role==='user'?'用户':'AI'}</span>
      <span style="font-size:11px;color:var(--muted);">${m.emotion||''} ${m.created_at?.slice(11,16)||''} ${m.voice_url?'有声':''}</span>
      <div style="margin-top:6px;">${m.content.slice(0,300)}${m.content.length>300?'...':''}</div>
    </div>
  `).join('');
  document.getElementById('msg-viewer').innerHTML=`
    <div class="modal"><div class="box">
      <button class="close" onclick="document.getElementById('msg-viewer').innerHTML=''">X</button>
      <h3>对话消息 (${d.messages.length}条)</h3>${msgs}
    </div></div>`;
}

// ── Config ──
async function loadConfig() {
  const d = await api('GET','/api/v1/admin/config');
  const rows = d.configs.map(c=>`
    <tr>
      <td style="font-weight:500;">${c.key}</td>
      <td style="font-family:monospace;">${c.value}</td>
      <td><input id="cv-${c.key}" value="${c.value}" style="width:200px;margin:0;"></td>
      <td><button class="btn-p" onclick="saveConfig('${c.key}')">保存</button></td>
    </tr>
  `).join('');
  document.getElementById('main-content').innerHTML=`
    <h1>系统配置</h1>
    <div class="card">
      <p style="color:var(--muted);margin-bottom:12px;">修改后重启后端生效</p>
      <table><thead><tr><th>配置项</th><th>当前值</th><th>新值</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}
async function saveConfig(key) {
  const val = document.getElementById('cv-'+key).value;
  await api('PUT','/api/v1/admin/config/'+key,{value:val});
  alert('已保存');
}
</script>
</body>
</html>
