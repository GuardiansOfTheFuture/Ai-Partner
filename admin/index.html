<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小暖 AI · 管理后台</title>
<style>
  :root { --bg:#F8FAFC; --card:#FFF; --border:#E2E8F0; --text:#1E293B; --muted:#64748B; --pink:#FF6B6B; --cta:#2563EB; --cta-h:#1D4ED8; --radius:8px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font:14px/1.6 -apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
  nav { width:220px; background:var(--card); border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
  nav .logo { font-size:18px; font-weight:700; color:var(--pink); margin-bottom:20px; }
  nav a { display:block; padding:8px 12px; border-radius:6px; color:var(--muted); font-size:13px; cursor:pointer; }
  nav a:hover,nav a.active { background:#FFF0F5; color:var(--pink); }
  main { flex:1; padding:24px; overflow-y:auto; }
  main h1 { font-size:22px; margin-bottom:20px; }
  .card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
  .stat { background:var(--card); border-radius:var(--radius); padding:16px 20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .stat .v { font-size:28px; font-weight:700; color:var(--pink); }
  .stat .l { font-size:12px; color:var(--muted); margin-top:2px; }
  input,textarea,button { font:inherit; }
  input,textarea { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; margin-bottom:10px; }
  textarea { resize:vertical; min-height:80px; }
  button { padding:8px 18px; border-radius:6px; border:none; cursor:pointer; font-weight:500; }
  .btn-p { background:var(--cta); color:#fff; }
  .btn-p:hover { background:var(--cta-h); }
  .btn-d { background:none; color:#EF4444; border:1px solid #FECACA; }
  .btn-s { background:var(--pink); color:#fff; }
  .btn-s:hover { background:#e55a5a; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; }
  .login-box { width:360px; margin:100px auto; background:var(--card); border-radius:12px; padding:32px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
  .login-box h1 { text-align:center; color:var(--pink); margin-bottom:24px; }
  .hidden { display:none !important; }
  .upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:24px; text-align:center; cursor:pointer; transition:.2s; }
  .upload-zone:hover { border-color:var(--cta); background:#F0F5FF; }
  .chunk-card { background:var(--bg); border-radius:6px; padding:12px; margin-bottom:8px; font-size:13px; }
  .chunk-card .meta { font-size:11px; color:var(--muted); margin-top:6px; }
  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; margin-right:4px; }
  .tag-p { background:#FFF0F5; color:var(--pink); }
  .tag-b { background:#F0F5FF; color:var(--cta); }
  .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal .box { background:#fff; border-radius:12px; padding:24px; width:700px; max-height:80vh; overflow-y:auto; }
  .modal .box h3 { margin-bottom:12px; }
  .close { float:right; border:none; background:none; font-size:20px; cursor:pointer; color:var(--muted); }
  .upload-status { font-size:12px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <h1>小暖 AI · 管理后台</h1>
    <input id="login-user" placeholder="用户名" value="admin">
    <input id="login-pass" type="password" placeholder="密码" value="admin123">
    <button class="btn-p" onclick="login()" style="width:100%;">登录</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-page" class="hidden" style="display:flex;width:100%;">
<nav>
  <div class="logo">🌸 小暖后台</div>
  <a class="active" data-page="dashboard" onclick="showPage('dashboard',this)">仪表盘</a>
  <a data-page="knowledge" onclick="showPage('knowledge',this)">知识库</a>
  <a data-page="users" onclick="showPage('users',this)">用户管理</a>
  <a data-page="conversations" onclick="showPage('conversations',this)">对话记录</a>
  <a onclick="logout()" style="color:#EF4444;margin-top:20px;">退出登录</a>
</nav>
<main id="main-content"></main>
</div>

<script>
let token = localStorage.getItem('admin_token');
const API = 'http://localhost:8000';
if (token) showAdmin();

async function login() {
  const r = await fetch(API+'/api/v1/admin/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('login-user').value,password:document.getElementById('login-pass').value})
  });
  if(!r.ok) return alert('账号或密码错误');
  token = (await r.json()).token;
  localStorage.setItem('admin_token',token);
  showAdmin();
}

function logout() { localStorage.removeItem('admin_token'); token=null; location.reload(); }
function showAdmin() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('admin-page').classList.remove('hidden');
  document.getElementById('admin-page').style.display='flex';
  showPage('dashboard',document.querySelector('nav a[data-page="dashboard"]'));
}

function showPage(page,el) {
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  if(page==='dashboard') loadDashboard();
  else if(page==='knowledge') loadKnowledge();
  else if(page==='users') loadUsers();
  else if(page==='conversations') loadConversations();
}

async function api(method,path,body) {
  const r = await fetch(API+path,{method,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:body?JSON.stringify(body):undefined});
  if(r.status===401){logout();throw new Error('Unauthorized');}
  return r.json();
}

// ── Dashboard ──
async function loadDashboard() {
  const d = await api('GET','/api/v1/admin/dashboard');
  document.getElementById('main-content').innerHTML=`
    <h1>仪表盘</h1>
    <div class="stats">
      <div class="stat"><div class="v">${d.document_count}</div><div class="l">文档数</div></div>
      <div class="stat"><div class="v">${d.chunk_count}</div><div class="l">文档块</div></div>
      <div class="stat"><div class="v">${d.user_count}</div><div class="l">用户数</div></div>
      <div class="stat"><div class="v">${d.conversation_count}</div><div class="l">对话数</div></div>
    </div>`;
}

// ── Knowledge (文档上传 + 块查看) ──
async function loadKnowledge() {
  const d = await api('GET','/api/v1/admin/documents');
  const rows = d.items.map(doc=>`
    <tr>
      <td>${doc.file_name}</td><td><span class="tag tag-p">${doc.file_type}</span></td>
      <td>${doc.chunk_count} 块</td><td><span class="tag tag-b">${doc.status}</span></td>
      <td>
        <button class="btn-p" onclick="viewChunks('${doc.document_id}','${doc.file_name}')">查看块</button>
        <button class="btn-d" onclick="delDoc('${doc.document_id}')">删除</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('main-content').innerHTML=`
    <h1>知识库管理</h1>
    <div class="card">
      <h3 style="margin-bottom:12px;">上传文档</h3>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <p style="font-size:24px;margin-bottom:6px;">📁</p>
        <p style="color:var(--muted);">点击选择 PDF / DOCX / TXT / MD 文件</p>
      </div>
      <input type="file" id="file-input" hidden accept=".pdf,.docx,.doc,.txt,.md,.markdown" multiple onchange="uploadDocs(this.files)">
      <div id="upload-status" class="upload-status"></div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px;">文档列表</h3>
      <table><thead><tr><th>文件名</th><th>类型</th><th>块数</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=5 style="color:var(--muted)">暂无文档，请上传</td></tr>'}</tbody></table>
    </div>
    <div id="chunk-viewer"></div>`;
}

async function uploadDocs(files) {
  if(!files.length) return;
  const s = document.getElementById('upload-status');
  let ok = 0;
  for(let i=0; i<files.length; i++) {
    const f = files[i];
    s.textContent = `处理中: ${i+1}/${files.length} ${f.name}...`;
    const fd = new FormData(); fd.append('file',f);
    const r = await fetch(API+'/api/v1/admin/documents/upload',{
      method:'POST',headers:{Authorization:'Bearer '+token},body:fd
    });
    if(r.ok) ok++;
  }
  s.textContent = `完成: ${ok}/${files.length} 个成功`;
  setTimeout(()=>loadKnowledge(),500);
}

async function viewChunks(docId,docName) {
  const d = await api('GET','/api/v1/admin/documents/'+docId+'/chunks');
  const chunks = d.chunks.map(c=>`
    <div class="chunk-card">
      <div>${c.content.slice(0,200)}${c.content.length>200?'...':''}</div>
      <div class="meta">
        <span class="tag tag-p">chunk_id: ${c.meta.chunk_id}</span>
        <span class="tag tag-b">idx: ${c.meta.chunk_index}</span>
        <span>文件: ${c.meta.file_name}</span>
        <span>类型: ${c.meta.file_type}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('chunk-viewer').innerHTML=`
    <div class="modal">
      <div class="box">
        <button class="close" onclick="document.getElementById('chunk-viewer').innerHTML=''">&times;</button>
        <h3>📄 ${docName} — ${d.total} 个块</h3>
        ${chunks}
      </div>
    </div>`;
}

async function delDoc(docId) {
  if(!confirm('确认删除？')) return;
  await api('DELETE','/api/v1/admin/documents/'+docId);
  loadKnowledge();
}

// ── Users ──
async function loadUsers() {
  document.getElementById('main-content').innerHTML=`
    <h1>用户管理</h1>
    <div class="card"><p style="color:var(--muted)">后续版本实现</p></div>`;
}

// ── Conversations ──
async function loadConversations() {
  document.getElementById('main-content').innerHTML=`
    <h1>对话记录</h1>
    <div class="card"><p style="color:var(--muted)">后续版本实现</p></div>`;
}
</script>
</body>
</html>
